<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            background-image: 
                radial-gradient(ellipse at top, #1a1a2e 0%, transparent 50%),
                radial-gradient(ellipse at bottom, #16213e 0%, transparent 50%);
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 640px;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .stats {
            display: flex;
            gap: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #666;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff6b6b;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 640px;
        }

        .card {
            width: 100px;
            height: 100px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
        }

        .card-front {
            background: linear-gradient(135deg, #1a1a2e, #2d2d4a);
            border: 2px solid #3d3d5c;
        }

        .card-front::after {
            content: '?';
            color: #3d3d5c;
            font-weight: 900;
        }

        .card-back {
            background: linear-gradient(135deg, #ff6b6b, #ff00ff);
            transform: rotateY(180deg);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .card.matched .card-back {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-score {
            font-size: 1.2rem;
            color: #fff;
        }

        .overlay-score span {
            color: #ff6b6b;
            font-weight: 700;
        }

        .start-btn {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #0a0a0f;
            background: linear-gradient(135deg, #ff6b6b, #ff00ff);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.8);
        }

        @media (max-width: 500px) {
            .card {
                width: 70px;
                height: 70px;
            }
            .game-board {
                gap: 10px;
            }
            .card-front, .card-back {
                font-size: 1.8rem;
            }
            .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">MEMORY</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">MOVES</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">PAIRS</div>
                <div class="stat-value" id="pairs">0</div>
            </div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="overlay" id="winOverlay">
        <div class="overlay-title">YOU WIN!</div>
        <div class="overlay-score">Completed in <span id="finalMoves">0</span> moves</div>
        <button class="start-btn" onclick="initGame()">PLAY AGAIN</button>
    </div>

    <script>
        const symbols = ['🎮', '🎯', '🎨', '🎭', '🎪', '🎬', '🎸', '🎺'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;

        const gameBoard = document.getElementById('gameBoard');
        const movesEl = document.getElementById('moves');
        const pairsEl = document.getElementById('pairs');
        const winOverlay = document.getElementById('winOverlay');
        const finalMovesEl = document.getElementById('finalMoves');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            cards = shuffle([...symbols, ...symbols]);
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;

            movesEl.textContent = '0';
            pairsEl.textContent = '0';
            winOverlay.classList.add('hidden');

            gameBoard.innerHTML = '';
            
            cards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.symbol = symbol;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back">${symbol}</div>
                    </div>
                `;
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesEl.textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;

            if (card1.dataset.symbol === card2.dataset.symbol) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                pairsEl.textContent = matchedPairs;
                flippedCards = [];
                canFlip = true;

                if (matchedPairs === symbols.length) {
                    setTimeout(() => {
                        finalMovesEl.textContent = moves;
                        winOverlay.classList.remove('hidden');
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        initGame();
    </script>
</body>
</html>
