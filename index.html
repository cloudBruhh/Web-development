<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Arcade</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #050508;
        background-image:
          radial-gradient(
            ellipse at 20% 20%,
            rgba(255, 107, 107, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(0, 255, 136, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(0, 204, 255, 0.05) 0%,
            transparent 70%
          ),
          linear-gradient(180deg, #050508 0%, #0a0a12 100%);
        font-family: "Orbitron", sans-serif;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.01) 2px,
          rgba(255, 255, 255, 0.01) 4px
        );
        pointer-events: none;
        z-index: 1000;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: linear-gradient(
          135deg,
          rgba(20, 20, 35, 0.9),
          rgba(15, 15, 25, 0.95)
        );
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        margin-bottom: 20px;
      }

      .logo {
        font-size: 1.8rem;
        font-weight: 900;
        background: linear-gradient(135deg, #ff6b6b, #00ff88, #00ccff, #ff6b6b);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 4px;
        animation: gradientShift 4s ease infinite;
      }

      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .game-tabs {
        display: flex;
        gap: 10px;
      }

      .tab-btn {
        padding: 12px 28px;
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: #555;
        background: linear-gradient(
          180deg,
          rgba(20, 20, 35, 0.9),
          rgba(15, 15, 25, 0.95)
        );
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow:
          0 4px 15px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .tab-btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: #888;
        transform: translateY(-2px);
      }

      .tab-btn.active {
        background: linear-gradient(135deg, #ff6b6b, #00ff88);
        border-color: transparent;
        color: #050508;
        box-shadow:
          0 4px 20px rgba(255, 107, 107, 0.3),
          0 0 30px rgba(0, 255, 136, 0.2);
      }

      .tab-btn .icon {
        font-size: 1.1rem;
      }

      .game-container {
        flex: 1;
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          rgba(20, 20, 35, 0.9),
          rgba(15, 15, 25, 0.95)
        );
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .game-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
        outline: none;
      }

      .game-frame:focus {
        outline: none;
      }

      .game-frame.active {
        display: block;
      }

      .home-screen {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        background: rgba(10, 10, 15, 0.98);
        transition: opacity 0.5s ease;
      }

      .home-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .home-title {
        font-size: 3rem;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          #ff6b6b,
          #ff9f43,
          #00ff88,
          #00ccff,
          #ff6b6b
        );
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradientShift 3s ease infinite;
        text-align: center;
      }

      .home-subtitle {
        font-size: 0.9rem;
        color: #444;
        letter-spacing: 6px;
        font-family: "Rajdhani", sans-serif;
      }

      .game-cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        max-width: 700px;
        padding: 20px;
      }

      .game-card {
        padding: 30px;
        background: linear-gradient(
          135deg,
          rgba(20, 20, 35, 0.9),
          rgba(15, 15, 25, 0.95)
        );
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .game-card:hover {
        transform: translateY(-5px) scale(1.02);
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.4),
          0 0 30px rgba(255, 107, 107, 0.2);
      }

      .game-card .icon {
        font-size: 3rem;
        margin-bottom: 15px;
        display: block;
      }

      .game-card .title {
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 3px;
        margin-bottom: 8px;
      }

      .game-card .desc {
        font-size: 0.7rem;
        color: #555;
        font-family: "Rajdhani", sans-serif;
        letter-spacing: 1px;
      }

      .game-card.snake .title {
        color: #00ff88;
      }

      .game-card.memory .title {
        color: #ff6b6b;
      }

      .game-card.maze .title {
        color: #ff9f43;
      }

      .game-card.number .title {
        color: #00ccff;
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        font-family: "Orbitron", sans-serif;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: #666;
        background: rgba(20, 20, 35, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        z-index: 10;
        display: none;
      }

      .back-btn.visible {
        display: block;
      }

      .back-btn:hover {
        border-color: rgba(255, 107, 107, 0.5);
        color: #ff6b6b;
      }

      @media (max-width: 800px) {
        .game-cards {
          grid-template-columns: 1fr;
          max-width: 350px;
        }
        .header {
          flex-direction: column;
          gap: 15px;
        }
        .game-tabs {
          flex-wrap: wrap;
          justify-content: center;
        }
        .home-title {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">GAME ARCADE</div>
        <div class="game-tabs">
          <button class="tab-btn active" data-game="home">
            <span class="icon">🏠</span> HOME
          </button>
          <button class="tab-btn" data-game="snake">
            <span class="icon">🐍</span> SNAKE
          </button>
          <button class="tab-btn" data-game="memory">
            <span class="icon">🃏</span> MEMORY
          </button>
          <button class="tab-btn" data-game="maze">
            <span class="icon">🌀</span> MAZE
          </button>
          <button class="tab-btn" data-game="number">
            <span class="icon">🎯</span> GUESS
          </button>
        </div>
      </div>

      <div class="game-container">
        <button class="back-btn" id="backBtn" onclick="showHome()">
          ← BACK TO MENU
        </button>

        <div class="home-screen" id="homeScreen">
          <div class="home-title">SELECT A GAME</div>
          <div class="home-subtitle">CHOOSE YOUR CHALLENGE</div>

          <div class="game-cards">
            <div class="game-card snake" onclick="openGame('snake')">
              <span class="icon">🐍</span>
              <div class="title">SNAKE</div>
              <div class="desc">CLASSIC SNAKE GAME</div>
            </div>
            <div class="game-card memory" onclick="openGame('memory')">
              <span class="icon">🃏</span>
              <div class="title">MEMORY</div>
              <div class="desc">CARD FLIPPING GAME</div>
            </div>
            <div class="game-card maze" onclick="openGame('maze')">
              <span class="icon">🌀</span>
              <div class="title">MAZE</div>
              <div class="desc">NAVIGATE THE LABYRINTH</div>
            </div>
            <div class="game-card number" onclick="openGame('number')">
              <span class="icon">🎯</span>
              <div class="title">GUESS</div>
              <div class="desc">NUMBER GUESSING GAME</div>
            </div>
          </div>
        </div>

        <iframe class="game-frame" id="snakeFrame" src="snake.html" tabindex="0"></iframe>
        <iframe
          class="game-frame"
          id="memoryFrame"
          src="flipcard-memory.html"
          tabindex="0"
        ></iframe>
        <iframe class="game-frame" id="mazeFrame" src="maze.html" tabindex="0"></iframe>
        <iframe class="game-frame" id="numberFrame" src="numgame.html" tabindex="0"></iframe>
      </div>
    </div>

    <script>
      const tabBtns = document.querySelectorAll(".tab-btn");
      const homeScreen = document.getElementById("homeScreen");
      const backBtn = document.getElementById("backBtn");
      const frames = document.querySelectorAll(".game-frame");

      tabBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const game = btn.dataset.game;
          if (game === "home") {
            showHome();
          } else {
            openGame(game);
          }
        });
      });

      function openGame(game) {
        frames.forEach((frame) => frame.classList.remove("active"));
        tabBtns.forEach((btn) => btn.classList.remove("active"));

        const frame = document.getElementById(`${game}Frame`);
        document.querySelector(`[data-game="${game}"]`).classList.add("active");
        frame.classList.add("active");

        homeScreen.classList.add("hidden");
        backBtn.classList.add("visible");
        
        setTimeout(() => frame.focus(), 100);
      }

      function showHome() {
        frames.forEach((frame) => frame.classList.remove("active"));
        tabBtns.forEach((btn) => btn.classList.remove("active"));

        document.querySelector('[data-game="home"]').classList.add("active");
        homeScreen.classList.remove("hidden");
        backBtn.classList.remove("visible");
      }
    </script>
  </body>
</html>
