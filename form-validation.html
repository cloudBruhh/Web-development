<!doctype html>
<html>
  <head>
    <title>Form Validation</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .form-container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 420px;
      }
      h1 {
        margin: 0 0 30px;
        color: #333;
        text-align: center;
        font-size: 28px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #555;
        font-weight: 500;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
        outline: none;
      }
      input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
      }
      input.error {
        border-color: #e74c3c;
      }
      input.success {
        border-color: #2ecc71;
      }
      .error-message {
        color: #e74c3c;
        font-size: 12px;
        margin-top: 5px;
        display: none;
      }
      .error-message.visible {
        display: block;
      }
      input[type="submit"] {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        margin-top: 10px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      input[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      input[type="submit"]:active {
        transform: translateY(0);
      }
    </style>
  </head>

  <body>
    <div class="form-container">
      <h1>Form Registration</h1>
      <form name="myForm" id="myForm" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Enter your name"
          />
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter your email"
          />
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Enter your password"
          />
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="age">Age</label>
          <input
            type="number"
            name="age"
            id="age"
            placeholder="Enter your age"
          />
          <div class="error-message" id="ageError"></div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input
            type="tel"
            name="phone"
            id="phone"
            placeholder="Enter phone number"
          />
          <div class="error-message" id="phoneError"></div>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" name="date" id="date" />
          <div class="error-message" id="dateError"></div>
        </div>

        <input type="submit" value="Submit" />
      </form>
    </div>

    <script>
      const form = document.getElementById("myForm");

      const patterns = {
        name: {
          pattern: /^[a-zA-Z\s]{3,}$/,
          message: "Name must be at least 3 letters (letters only)",
        },
        email: {
          pattern: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
          message: "Please enter a valid email address",
        },
        password: {
          pattern:
            /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$/,
          message:
            "Password must be at least 8 characters with uppercase, lowercase, number, and special character",
        },
        phone: {
          pattern:
            /^[(]{0,1}[0-9]{3}[)]{0,1}[-\s\.]{0,1}[0-9]{3}[-\s\.]{0,1}[0-9]{4}$/,
          message: "Enter phone in format: 890-657-4353",
        },
        age: {
          pattern: /^(1[8-9]|[2-9]\d)$/,
          message: "Age must be 18 or above",
        },
        date: {
          pattern: /^\d{4}-\d{2}-\d{2}$/,
          message: "Enter a valid date in YYYY-MM-DD format",
        },
      };

      function validateField(fieldName, value) {
        const input = document.getElementById(fieldName);
        const errorDiv = document.getElementById(fieldName + "Error");
        const pattern = patterns[fieldName];

        if (!pattern) return true;

        if (!value.trim()) {
          input.classList.remove("success");
          input.classList.add("error");
          errorDiv.textContent = "This field is required";
          errorDiv.classList.add("visible");
          return false;
        }

        if (!pattern.pattern.test(value)) {
          input.classList.remove("success");
          input.classList.add("error");
          errorDiv.textContent = pattern.message;
          errorDiv.classList.add("visible");
          return false;
        }

        input.classList.remove("error");
        input.classList.add("success");
        errorDiv.classList.remove("visible");
        return true;
      }

      Object.keys(patterns).forEach((fieldName) => {
        const input = document.getElementById(fieldName);
        input.addEventListener("blur", () =>
          validateField(fieldName, input.value),
        );
        input.addEventListener("input", () => {
          if (
            input.classList.contains("error") ||
            input.classList.contains("success")
          ) {
            validateField(fieldName, input.value);
          }
        });
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        let isValid = true;
        const fields = ["name", "email", "password", "age", "phone", "date"];

        fields.forEach((fieldName) => {
          const input = document.getElementById(fieldName);
          if (!validateField(fieldName, input.value)) {
            isValid = false;
          }
        });

        if (isValid) {
          alert("Form submitted successfully!");
          form.reset();
          document.querySelectorAll("input").forEach((input) => {
            input.classList.remove("success");
          });
        }
      });
    </script>
  </body>
</html>
