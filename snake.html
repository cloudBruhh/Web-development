<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0a0a0f;
        background-image:
          radial-gradient(ellipse at top, #1a1a2e 0%, transparent 50%),
          radial-gradient(ellipse at bottom, #16213e 0%, transparent 50%);
        font-family: "Orbitron", sans-serif;
        overflow: hidden;
      }

      .game-container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 440px;
        padding: 0 10px;
      }

      .title {
        font-size: 2.5rem;
        font-weight: 900;
        background: linear-gradient(135deg, #00ff88, #00ccff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        letter-spacing: 4px;
      }

      .score-display {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      .score-label {
        font-size: 0.7rem;
        color: #666;
        letter-spacing: 2px;
      }

      .score-value {
        font-size: 1.8rem;
        font-weight: 700;
        color: #00ff88;
        text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
      }

      .canvas-wrapper {
        position: relative;
        padding: 4px;
        background: linear-gradient(135deg, #00ff88, #00ccff, #ff00ff);
        border-radius: 12px;
        box-shadow:
          0 0 40px rgba(0, 255, 136, 0.3),
          0 0 80px rgba(0, 204, 255, 0.2);
      }

      #gameCanvas {
        display: block;
        background: #0d0d15;
        border-radius: 8px;
      }

      .overlay {
        position: absolute;
        top: 4px;
        left: 4px;
        right: 4px;
        bottom: 4px;
        background: rgba(10, 10, 15, 0.95);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      .overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .overlay-title {
        font-size: 2rem;
        font-weight: 900;
        background: linear-gradient(135deg, #00ff88, #00ccff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .overlay-score {
        font-size: 1.2rem;
        color: #fff;
      }

      .overlay-score span {
        color: #00ff88;
        font-weight: 700;
      }

      .start-btn {
        padding: 15px 40px;
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: #0a0a0f;
        background: linear-gradient(135deg, #00ff88, #00ccff);
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      }

      .start-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 50px rgba(0, 255, 136, 0.8);
      }

      .controls-hint {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .key {
        width: 40px;
        height: 40px;
        background: #1a1a2e;
        border: 2px solid #333;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #666;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .key-row {
        display: flex;
        gap: 5px;
      }

      .key-spacer {
        width: 40px;
      }

      .speed-control {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 10px;
      }

      .speed-label {
        color: #666;
        font-size: 0.8rem;
        letter-spacing: 1px;
      }

      .speed-slider {
        -webkit-appearance: none;
        width: 150px;
        height: 6px;
        background: #1a1a2e;
        border-radius: 3px;
        outline: none;
      }

      .speed-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background: linear-gradient(135deg, #00ff88, #00ccff);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
      }

      .speed-value {
        color: #00ff88;
        font-weight: 700;
        min-width: 50px;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="header">
        <div class="title">SNAKE</div>
        <div class="score-display">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="score">0</div>
        </div>
      </div>

      <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="420" height="420"></canvas>

        <div class="overlay" id="startOverlay">
          <div class="overlay-title">SNAKE</div>
          <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
          <div class="overlay-title">GAME OVER</div>
          <div class="overlay-score">
            Final Score: <span id="finalScore">0</span>
          </div>
          <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
      </div>

        <div class="controls-hint">
            <div class="key-row">
                <div class="key-spacer"></div>
                <div class="key">↑</div>
                <div class="key-spacer"></div>
            </div>
            <div class="key-row">
                <div class="key">←</div>
                <div class="key">↓</div>
                <div class="key">→</div>
            </div>
        </div>

      <div class="speed-control">
        <span class="speed-label">SPEED</span>
        <input
          type="range"
          class="speed-slider"
          id="speedSlider"
          min="50"
          max="200"
          value="120"
        />
        <span class="speed-value" id="speedValue">120ms</span>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const finalScoreEl = document.getElementById("finalScore");
      const startOverlay = document.getElementById("startOverlay");
      const gameOverOverlay = document.getElementById("gameOverOverlay");
      const speedSlider = document.getElementById("speedSlider");
      const speedValue = document.getElementById("speedValue");

      const gridSize = 20;
      const tileCount = canvas.width / gridSize;

      let snake = [];
      let food = { x: 0, y: 0 };
      let dx = 0;
      let dy = 0;
      let nextDx = 0;
      let nextDy = 0;
      let score = 0;
      let gameLoop = null;
      let isGameRunning = false;
      let speed = 120;

      speedSlider.addEventListener("input", (e) => {
        speed = parseInt(e.target.value);
        speedValue.textContent = speed + "ms";
        if (isGameRunning) {
          clearInterval(gameLoop);
          gameLoop = setInterval(gameStep, speed);
        }
      });

      function startGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 },
        ];
        score = 0;
        dx = 1;
        dy = 0;
        nextDx = 1;
        nextDy = 0;
        scoreEl.textContent = score;
        placeFood();
        isGameRunning = true;

        startOverlay.classList.add("hidden");
        gameOverOverlay.classList.add("hidden");

        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(gameStep, speed);
      }

      function placeFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);

        for (let part of snake) {
          if (part.x === food.x && part.y === food.y) {
            placeFood();
            break;
          }
        }
      }

      function gameStep() {
        dx = nextDx;
        dy = nextDy;

        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        if (
          head.x < 0 ||
          head.x >= tileCount ||
          head.y < 0 ||
          head.y >= tileCount
        ) {
          gameOver();
          return;
        }

        for (let part of snake) {
          if (head.x === part.x && head.y === part.y) {
            gameOver();
            return;
          }
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreEl.textContent = score;
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function draw() {
        ctx.fillStyle = "#0d0d15";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "#15151f";
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= tileCount; i++) {
          ctx.beginPath();
          ctx.moveTo(i * gridSize, 0);
          ctx.lineTo(i * gridSize, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i * gridSize);
          ctx.lineTo(canvas.width, i * gridSize);
          ctx.stroke();
        }

        for (let i = 0; i < snake.length; i++) {
          const gradient = ctx.createRadialGradient(
            snake[i].x * gridSize + gridSize / 2,
            snake[i].y * gridSize + gridSize / 2,
            0,
            snake[i].x * gridSize + gridSize / 2,
            snake[i].y * gridSize + gridSize / 2,
            gridSize / 2,
          );

          if (i === 0) {
            gradient.addColorStop(0, "#00ffcc");
            gradient.addColorStop(1, "#00ff88");
          } else {
            const alpha = 1 - (i / snake.length) * 0.5;
            gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
            gradient.addColorStop(1, `rgba(0, 200, 100, ${alpha})`);
          }

          ctx.fillStyle = gradient;
          ctx.shadowColor = "#00ff88";
          ctx.shadowBlur = i === 0 ? 15 : 5;
          ctx.fillRect(
            snake[i].x * gridSize + 1,
            snake[i].y * gridSize + 1,
            gridSize - 2,
            gridSize - 2,
          );
          ctx.shadowBlur = 0;
        }

        const foodGradient = ctx.createRadialGradient(
          food.x * gridSize + gridSize / 2,
          food.y * gridSize + gridSize / 2,
          0,
          food.x * gridSize + gridSize / 2,
          food.y * gridSize + gridSize / 2,
          gridSize / 2,
        );
        foodGradient.addColorStop(0, "#ff6b6b");
        foodGradient.addColorStop(1, "#ff00ff");

        ctx.fillStyle = foodGradient;
        ctx.shadowColor = "#ff00ff";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(
          food.x * gridSize + gridSize / 2,
          food.y * gridSize + gridSize / 2,
          gridSize / 2 - 2,
          0,
          Math.PI * 2,
        );
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      function gameOver() {
        isGameRunning = false;
        clearInterval(gameLoop);
        finalScoreEl.textContent = score;
        gameOverOverlay.classList.remove("hidden");
      }

      const keyHandler = (e) => {
        const code = e.code;

        if (
          code === "ArrowUp" ||
          code === "ArrowDown" ||
          code === "ArrowLeft" ||
          code === "ArrowRight"
        ) {
          e.preventDefault();
        }

        if (!isGameRunning) return;

        if (code === "ArrowUp") {
          if (dy !== 1) {
            nextDx = 0;
            nextDy = -1;
          }
        } else if (code === "ArrowDown") {
          if (dy !== -1) {
            nextDx = 0;
            nextDy = 1;
          }
        } else if (code === "ArrowLeft") {
          if (dx !== 1) {
            nextDx = -1;
            nextDy = 0;
          }
        } else if (code === "ArrowRight") {
          if (dx !== -1) {
            nextDx = 1;
            nextDy = 0;
          }
        }
      };

      window.addEventListener("keydown", keyHandler, { passive: false });

      document.addEventListener("click", () => {
        window.focus();
      });

      draw();
    </script>
  </body>
</html>
